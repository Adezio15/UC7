<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Consulta de CEP</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>Consulta de CEP</h1>

    <input type="text" id="cep" placeholder="Digite o CEP (somente números)" maxlength="8">

    <!-- 🔥 BOTÃO -->
    <button onclick=consultarCEP()>Pesquisar CEP</button>

    <!-- LOADING -->
    <p id="loading" style="display:none;">Buscando CEP...</p>

    <br><br>

    <label>Cidade:</label><br>
    <input type="text" id="cidade"><br><br>

    <label>Rua:</label><br>
    <input type="text" id="rua"><br><br>

    <label>Bairro:</label><br>
    <input type="text" id="bairro"><br><br>

     <label>Estado:</label><br>
    <input type="text" id="estado"><br><br>

    <label>Número:</label><br>
    <input type="text" id="numero"><br><br>

    <script src="api.js"></script>


</body>
</html>
