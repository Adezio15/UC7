<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Formulários - Inova Tech</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET + BOX MODEL */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

/* TÍTULOS */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* FORMULÁRIO CENTRALIZADO */
.form-container {
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border: 2px solid #2563eb;
    border-radius: 10px;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* CAMPOS */
input, select, textarea {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* PLACEHOLDER */
::placeholder {
    color: #888;
    font-style: italic;
}

/* TIPOS DE INPUT */
input[type="text"] { border-left: 4px solid #2563eb; }
input[type="email"] { border-left: 4px solid #16a34a; }
input[type="tel"] { border-left: 4px solid #f59e0b; }
input[type="date"] { border-left: 4px solid #9333ea; }
input[type="file"] { background-color: #f0f9ff; }

/* VALIDAÇÃO */
input:invalid {
    border: 2px solid red;
}

input:valid {
    border: 2px solid green;
}

/* FOCO */
input:focus, select:focus, textarea:focus {
    outline: none;
    border: 2px solid #2563eb;
    background-color: #eff6ff;
}

/* TEXTAREA COM SCROLL */
textarea {
    height: 120px;
    resize: none;
    overflow-y: auto;
}

/* BOTÕES */
button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER BOTÃO */
button:hover {
    background: #1e3a8a;
    transform: scale(1.05);
}

/* FIELDSET */
fieldset {
    border: none;
}

/* LOGO */
.logo {
    display: block;
    margin: 0 auto 20px;
}

/* RODAPÉ */
footer {
    text-align: center;
    margin-top: 30px;
}

/* HOVER RODAPÉ */
footer p:hover {
    transform: scale(1.2);
    transition: 0.3s;
}

</style>
</head>

<body>

<h2>Formulários para Matrículas</h2>

<a href="INOVATEC.HTML">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_0Dni7ynWFJIH4RAN-Rj0_R_nfT2-YebvzQ&s" 
class="logo" width="100">
</a>

<!-- FORMULÁRIO DE CONTATO -->
<div class="form-container">

<h2>Formulário de Contato</h2>

<form>

<input type="text" placeholder="Nome" required minlength="3">
<input type="email" placeholder="Email" required>
<input type="tel" maxlength="11" placeholder="Telefone" required pattern="[0-9]{11}">

<input type="text" placeholder="Assunto">

<select required>
<option value="">Selecione o Curso</option>
<option>Desenvolvimento de Sistemas</option>
<option>Informática</option>
</select>

<textarea placeholder="Mensagem" required></textarea>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

</div>

<!-- FORMULÁRIO DE MATRÍCULA -->
<div class="form-container">

<h2>Formulário de Matrícula</h2>

<form>

<input type="text" placeholder="Nome completo" required minlength="5">
<input type="text" maxlength="11" placeholder="CPF" required pattern="[0-9]{11}">
<input type="text" placeholder="Endereço">

<input type="email" placeholder="Email">
<input type="tel" maxlength="11" placeholder="Telefone">

<label>Sexo</label>
<select required>
<option value="">Selecione</option>
<option>Masculino</option>
<option>Feminino</option>
</select>

<label>Data de nascimento</label>
<input type="date" required>

<label>Escolaridade</label>
<select required>
<option value="">Selecione</option>
<option>Ensino Fundamental</option>
<option>Ensino Médio</option>
<option>Ensino Superior</option>
</select>

<label>Cidade</label>
<select required>
<option value="">Selecione</option>
<option>Natal</option>
<option>Mossoró</option>
<option>Parnamirim</option>
</select>

<label>Estado</label>
<select required>
<option value="">Selecione</option>
<option>RN</option>
<option>CE</option>
<option>PB</option>
</select>

<label>Enviar documentação</label>
<input type="file" required>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

</div>

<footer>
<p>Email: contato@inovatech.com</p>
<p>Instagram | Facebook | LinkedIn</p>
</footer>

</body>
</html>
